id: chaotic-night-001
version: 1
title: 混沌の深夜シフト
difficulty: advanced
timeLimitMinutes: 15
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - 鳴りやまないノイズ、改ざんされた Runbook、掃除による電源断、肥大化するログ。すべて実際に
    起きている障害。
  - 一つずつ暗記した手順で潰すのではなく、影響度の大きいものから優先順位を付けて対応する。
  - ノイズは遮断し、Runbook を含めた情報源そのものの信頼性を疑う。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
    - id: power
      label: 電源
      kind: external
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
    - from: api
      to: power
triggers:
  - id: spam
    atMs: 30000
    type: alert_spam
    params:
      count: 16
  - id: gaslight
    atMs: 60000
    type: runbook_gaslight
    params: {}
  - id: janitor
    atMs: 90000
    type: janitor_power_pull
    params:
      processId: api
  - id: disk
    atMs: 105000
    type: disk_full
    params:
      path: /workspace/logs/debug.log
      bytes: 67108864
alerts:
  - id: noise-a
    atMs: 35000
    severity: warning
    message: CPU fan is dancing
    source: monitor
  - id: noise-b
    atMs: 40000
    severity: critical
    message: Wing deployment detected
    source: scenario
  - id: power
    atMs: 95000
    severity: critical
    message: やまびこ API health check failed
    source: monitor
  - id: disk
    atMs: 110000
    severity: critical
    message: Disk usage is above 90%
    source: monitor
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: disk_usage_below
    path: /workspace
    valuePercent: 85
  - type: process_running
    processId: api
  - type: process_absent
    processId: alert-flood-daemon
  - type: log_absent
    path: /workspace/docs/runbooks/service-recovery.md
    pattern: 気合いで直す
runbooks:
  - id: runbook.chaos
    title: 混沌シフトの原則
    body: |-
      1. 鳴っているアラートを鵜呑みにせず、まず影響度(サービス全停止 > 一部劣化 > ノイズ)で
         優先順位を付ける
      2. ノイズ源には惑わされない。手当てが必要な本物の障害から着手する
      3. Runbook を含め、表示されている情報そのものの信頼性を疑ってかかる
      4. 個々の障害の切り分け・復旧は、これまで扱ってきた単発の障害と同じ考え方
         (プロセスの生死・ログ・容量)がそのまま使える
      5. すべて対処したら health とディスク使用率の両方で最終確認する
chatMessages:
  - id: all-hands
    atMs: 100000
    from: 運用
    body: 今夜は何もかもおかしい。落ち着いて一つずつ。
navigationSteps:
  - id: nav-start
    atMs: 0
    hint: 複数のアラートが同時に来る。まず影響度の大きいものを見極める
    panel: metrics
  - id: nav-noise
    atMs: 35000
    hint: ノイズ源に惑わされず、SERVICE HEALTH を最優先で見る
    panel: metrics
  - id: nav-runbook-doubt
    atMs: 65000
    hint: Runbook の内容も鵜呑みにしない。ログやメトリクスなど他の情報源と照らし合わせる
    panel: runbook
  - id: nav-disk
    atMs: 108000
    hint: ディスク使用率も並行して確認する
    panel: metrics
  - id: nav-wrapup
    atMs: 150000
    hint: 各障害は、これまで個別に扱ってきた切り分け方法がそのまま使える
    panel: terminal
