id: disk-restart-loop-001
version: 1
title: 再起動しても直らない夜
difficulty: intermediate
difficultyScore: 270
timeLimitMinutes: 10
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - API が落ちている。再起動すれば直るはずだが、health がすぐ 500 に戻ってしまう。
  - 「直った」と思うのはまだ早い。ディスク要因が残っている間は再起動しても意味がない。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
triggers:
  - id: loop
    atMs: 60000
    type: composite_restart_loop
    params:
      diskPath: /workspace/logs/debug.log
      bytes: 838860800
      processId: api
alerts:
  - id: disk-full
    atMs: 70000
    severity: critical
    message: Disk usage is above 95%
    source: monitor
  - id: api-down
    atMs: 80000
    severity: critical
    message: API process is down
    source: scenario
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: disk_usage_below
    path: /workspace
    valuePercent: 80
  - type: process_running
    processId: api
runbooks:
  - id: runbook.loop
    title: 再起動ループ
    body: 1. yamactl restart api\n2. すぐ再発する場合は原因が残っている。df -h と du -sh /workspace/logs/* で容量を見る\n3. 容量を確保してから再起動し直す\n4. health 確認
chatMessages: []
