id: keyboard-spill-001
version: 1
title: キーボードに酒をこぼした夜
difficulty: intermediate
timeLimitMinutes: 12
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - 冷蔵庫のお酒を飲みながら対応すると、キーボードに飲み物をこぼす事故が起きる。
  - ターミナル入力にノイズが混ざる。keyboard.spill マーカーを片付ける。
  - API 自体は生きていることが多い。落ち着いてコマンドを打ち直す。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
triggers:
  - id: spill
    atMs: 50000
    type: keyboard_spill
    params:
      noise: べちゃっxべちゃっ
alerts:
  - id: input-noise
    atMs: 65000
    severity: warning
    message: Terminal input anomaly detected
    source: scenario
  - id: fridge-cam
    atMs: 80000
    severity: info
    message: 'Fridge camera: beverage level dropping'
    source: monitor
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: marker_absent
    path: /workspace/run/keyboard.spill
runbooks:
  - id: runbook.spill
    title: キーボードこぼし対応
    body: 1. cat /workspace/run/keyboard.spill で状況確認\n2. rm /workspace/run/keyboard.spill /workspace/run/terminal.noise\n3. ターミナルを一度クリアしてコマンドを打ち直す\n4. curl localhost:8080/health でサービス確認
chatMessages:
  - id: boss-dont-drink
    atMs: 90000
    from: 上司
    body: 対応中は飲まないで。キーボード洗って。
navigationSteps:
  - id: nav-terminal
    atMs: 0
    hint: ターミナルに変な文字が混ざっていないか見る
    panel: terminal
  - id: nav-spill
    atMs: 55000
    hint: keyboard.spill マーカーを確認する
    panel: terminal
    suggestedCommand: cat /workspace/run/keyboard.spill
  - id: nav-runbook
    atMs: 75000
    hint: キーボードこぼし Runbook を開く
    panel: runbook
