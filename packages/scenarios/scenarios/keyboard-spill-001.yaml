id: keyboard-spill-001
version: 1
title: キーボードに酒をこぼした夜
difficulty: intermediate
difficultyScore: 260
timeLimitMinutes: 12
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - 冷蔵庫のお酒を飲みながら作業していたら、キーボードに飲み物をこぼしてしまった。
  - その拍子に何かのキー操作が暴発し、スクリプトが実行されてしまったらしい。以降、API への
    リクエストが妙に多い。
  - API 自体は生きていることが多い。何が起きているかを切り分けてから対処する。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
triggers:
  - id: spill
    atMs: 50000
    type: runaway_loadgen
    params: {}
alerts:
  - id: traffic-spike
    atMs: 58000
    severity: warning
    message: RPS is trending well above baseline
    source: monitor
  - id: input-noise
    atMs: 68000
    severity: warning
    message: Terminal input anomaly detected
    source: scenario
  - id: fridge-cam
    atMs: 82000
    severity: info
    message: 'Fridge camera: beverage level dropping'
    source: monitor
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: process_absent
    processId: loadgen
runbooks:
  - id: runbook.spill
    title: 高頻度リクエストの切り分け
    body: |-
      1. メトリクス画面で RPS / レイテンシに異常が出ていないか確認する
      2. /workspace/logs/access.log や app.log を見て、リクエストの様子を確認する
      3. ps や pgrep でアクセスを送り続けているプロセスを特定する
      4. 特定できたら該当プロセスを止める
      5. curl localhost:8080/health でサービスを確認する
chatMessages:
  - id: boss-dont-drink
    atMs: 90000
    from: 上司
    body: 対応中は飲まないで。キーボード洗って。
navigationSteps:
  - id: nav-start
    atMs: 0
    hint: 開始直後はまず通常運転かどうか、メトリクス全体をざっと見ておく
    panel: metrics
  - id: nav-traffic
    atMs: 55000
    hint: RPS やレイテンシに普段と違う動きが出ていないか確認する
    panel: metrics
  - id: nav-log
    atMs: 70000
    hint: access.log や app.log で、何が起きているか手がかりを探す
    panel: terminal
    suggestedCommand: tail -n 50 /workspace/logs/access.log
  - id: nav-process
    atMs: 90000
    hint: 見覚えのないプロセスがいないか ps で確認し、怪しいものを pgrep -f <名前> で特定して止める
    panel: terminal
    suggestedCommand: ps aux | grep node
