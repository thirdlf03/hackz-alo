id: monitor-blind-001
version: 1
title: 監視が見えない夜
difficulty: advanced
timeLimitMinutes: 15
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - メトリクス欠損時はログと直接ヘルスチェックを信頼する。
  - Editor とターミナルを併用する。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
    - id: monitor
      label: 監視基盤
      kind: service
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
    - from: monitor
      to: api
triggers:
  - id: blind
    atMs: 30000
    type: monitor_blind
    params:
      blindMetrics:
        - cpu
        - memory
  - id: stop-api
    atMs: 90000
    type: process_stop
    params:
      processId: api
alerts:
  - id: metrics-missing
    atMs: 50000
    severity: warning
    message: Core metrics are missing
    source: monitor
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: process_running
    processId: api
  - type: marker_absent
    path: /workspace/run/monitor.blind.json
runbooks:
  - id: runbook.blind
    title: 監視欠損時
    body: 1. curl で直接確認\n2. app.log を読む\n3. rm monitor.blind.json\n4. 復旧
chatMessages: []
