id: monitor-blind-001
version: 1
title: 監視が見えない夜
difficulty: advanced
difficultyScore: 320
timeLimitMinutes: 15
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - CPU/メモリのグラフが「0」ではなく「NO DATA」になったら、それは平常運転ではない。監視そのものが
    壊れているサインかもしれない。
  - 監視エージェントも1つのプロセスに過ぎない。落ちればデータは止まる。
  - 同時に API 自体も応答しなくなることがある。監視の復旧とサービス本体の復旧は別物として、両方
    確認すること。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
  - id: monitor-agent
    command: node /workspace/services/monitor-agent/agent.mjs
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
    - id: monitor
      label: 監視基盤
      kind: service
      processId: monitor-agent
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
    - from: monitor
      to: api
triggers:
  - id: blind
    atMs: 30000
    type: monitor_blind
    params:
      blindMetrics:
        - cpu
        - memory
  - id: stop-api
    atMs: 90000
    type: process_stop
    params:
      processId: api
alerts:
  - id: metrics-missing
    atMs: 50000
    severity: warning
    message: CPU/メモリの計測データが欠測しています(NO DATA)
    source: monitor
  - id: api-down
    atMs: 100000
    severity: critical
    message: やまびこ API health check failed
    source: monitor
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: process_running
    processId: api
  - type: process_running
    processId: monitor-agent
runbooks:
  - id: runbook.blind
    title: 監視欠損時の初動
    body: |-
      1. メトリクスが「0」ではなく「NO DATA」であることに気づく。これは値ではなく欠測を意味する
      2. 監視が壊れていても、サービス本体が無事とは限らない。curl で直接ヘルスを確認する
      3. app.log で monitor-agent と api、それぞれの生死を個別に確認する
      4. 死んでいるプロセスをそれぞれ復旧する(例: yamactl restart monitor-agent, yamactl
         restart api)
      5. 監視が復旧したら、メトリクスが実データに戻っているか確認する
chatMessages:
  - id: senpai-monitor
    atMs: 70000
    from: 先輩(仮眠中)
    body: 監視、たまに死ぬんだよな…気づいたら直しといて…zzz
navigationSteps:
  - id: nav-metrics
    atMs: 0
    hint: CPU/メモリのグラフが 0 なのか NO DATA なのか、よく見ておく
    panel: metrics
  - id: nav-nodata
    atMs: 35000
    hint: NO DATA になったら、監視自体が壊れている可能性を疑う
    panel: metrics
  - id: nav-log
    atMs: 55000
    hint: app.log で monitor-agent と api、それぞれの生死を確認する
    panel: terminal
    suggestedCommand: tail -n 50 /workspace/logs/app.log
  - id: nav-health
    atMs: 95000
    hint: API 自体が無事かどうかも curl で直接確認する
    panel: terminal
    suggestedCommand: curl --max-time 3 localhost:8080/health
  - id: nav-runbook
    atMs: 110000
    hint: 両方の復旧が必要なら Runbook を確認する
    panel: runbook
