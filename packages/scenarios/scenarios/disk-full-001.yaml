id: disk-full-001
version: 1
title: ログが世界を埋め尽くす夜
difficulty: beginner
difficultyScore: 120
timeLimitMinutes: 5
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - やまびこ API はログを /workspace/logs に出す。
  - ディスク使用率が高いと API は 500 を返し始める。
  - df で全体を見て、du で怪しいログを絞り込み、tail で中身を確認する。この3つのコマンドを覚える回だと思ってほしい。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
triggers:
  - id: fill-debug-log
    atMs: 60000
    type: disk_full
    params:
      path: /workspace/logs/debug.log
      bytes: 838860800
alerts:
  - id: disk-95
    atMs: 90000
    severity: critical
    message: Disk usage is above 95%
    source: monitor
  - id: http-500
    atMs: 100000
    severity: critical
    message: HTTP 500 rate is above threshold
    source: scenario
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: disk_usage_below
    path: /workspace
    valuePercent: 80
  - type: process_running
    processId: api
runbooks:
  - id: runbook.disk-full
    title: Disk Full 対応
    body: 1. df -h で全体の使用率を見る\n2. 犯人を決めつけず、du -sh /workspace/logs/* でどのログが肥大化しているか特定する\n3. tail で中身を確認し、消してよいログか判断する\n4. 不要なログを退避または削除する\n5. curl localhost:8080/health で復旧確認する
chatMessages:
  - id: runbook-old
    atMs: 105000
    from: 先輩
    body: 昔は /var/log を見てたけど、今は /workspace/logs かも。
navigationSteps:
  - id: nav-disk
    atMs: 0
    hint: Disk メトリクスが上昇していないか見る
    panel: metrics
  - id: nav-df
    atMs: 45000
    hint: df -h でマウント使用率を確認する
    panel: terminal
    suggestedCommand: df -h
  - id: nav-runbook-disk
    atMs: 75000
    hint: Disk Full Runbook を開いて手順を追う
    panel: runbook
