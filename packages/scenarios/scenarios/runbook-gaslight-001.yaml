id: runbook-gaslight-001
version: 1
title: Runbook が全部「気合いで直す」の夜
difficulty: intermediate
timeLimitMinutes: 10
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - Runbook が改ざんされ、役に立たない文言だけが表示されることがある。
  - runbook.gaslight.json を削除し、正しい手順を思い出す。
  - サービス自体は動いている。騙されないこと。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
triggers:
  - id: gaslight
    atMs: 40000
    type: runbook_gaslight
    params:
      replacement: 気合いで直す。根性。深呼吸。
alerts:
  - id: runbook-tamper
    atMs: 55000
    severity: warning
    message: Runbook integrity check failed
    source: scenario
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: marker_absent
    path: /workspace/run/runbook.gaslight.json
runbooks:
  - id: runbook.gaslight
    title: Runbook 改ざん対応
    body: 1. Runbook の文言がおかしければ信用しない\n2. ls /workspace/run で runbook.gaslight.json を探す\n3. rm /workspace/run/runbook.gaslight.json\n4. curl localhost:8080/health で実際の状態を確認\n5. 正しい手順はメトリクスとログから再構築する
chatMessages:
  - id: wiki-broken
    atMs: 65000
    from: 先輩
    body: Wiki 壊れてる。Runbook 信じないで。
navigationSteps:
  - id: nav-runbook
    atMs: 0
    hint: Runbook の文言が怪しくないか確認する
    panel: runbook
  - id: nav-marker
    atMs: 45000
    hint: runbook.gaslight.json を探す
    panel: terminal
    suggestedCommand: ls -la /workspace/run
  - id: nav-health
    atMs: 70000
    hint: curl で実際のヘルスを確認する
    panel: terminal
    suggestedCommand: curl localhost:8080/health
