id: cable-jumprope-001
version: 1
title: LANケーブル縄跳びの夜
difficulty: intermediate
timeLimitMinutes: 8
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - API は生きているのに 5xx が返る。そんな時は依存先を疑う。
  - API → DB の経路のどこで壊れているのかを順番に切り分ける。
  - 障害の原因は、技術的とは限らない。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
triggers:
  - id: jumprope
    atMs: 55000
    type: cable_jumprope
    params:
      processId: fake-db
alerts:
  - id: api-500
    atMs: 75000
    severity: critical
    message: やまびこ API health check failed
    source: monitor
  - id: db-link
    atMs: 90000
    severity: warning
    message: DB rack link down
    source: scenario
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: process_running
    processId: api
  - type: process_running
    processId: fake-db
runbooks:
  - id: runbook.jumprope
    title: 依存先の切り分け
    body: |-
      1. curl localhost:8080/health で API の応答を見る(500 の reason を読む)
      2. API 自体の問題か、依存先(DB)の問題かを分ける
         yamactl status api / yamactl status fake-db
      3. 依存先が死んでいたら復旧する(yamactl restart fake-db)
      4. /workspace/run に現場の痕跡が残っていることがある。報告に添える
      5. health で復旧確認する
chatMessages:
  - id: infra-joke
    atMs: 110000
    from: インフラ
    body: 縄跳び大会やってる？DB ラックの前に人が集まってるんだけど。
navigationSteps:
  - id: nav-health
    atMs: 30000
    hint: curl localhost:8080/health で reason を読む
    panel: terminal
    suggestedCommand: curl localhost:8080/health
  - id: nav-db-status
    atMs: 70000
    hint: 依存先の状態を確認する
    panel: terminal
    suggestedCommand: yamactl status fake-db
