id: unlang-batch-001
version: 1
title: うんともすんとも言わないバッチ
difficulty: beginner
timeLimitMinutes: 12
service:
  name: うん用 batch
  healthUrl: http://localhost:8080/health
briefing:
  - 深夜バッチはうん言語で書かれている。
  - 失敗時のログは不親切だが、仕様表を読むと原因が推測できる。
  - まず batch.log と対象ファイルを確認する。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/unyoh-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
triggers:
  - id: break-sales-batch
    atMs: 90000
    type: unlang_batch_failure
    params:
      jobId: sales-nightly
      path: /workspace/services/batch/sales.un
alerts:
  - id: batch-failed
    atMs: 120000
    severity: critical
    message: sales-nightly batch failed
    source: scenario
successConditions:
  - type: unlang_batch_ok
    jobId: sales-nightly
  - type: log_absent
    path: /workspace/logs/batch.log
    pattern: うんともすんとも
runbooks:
  - id: runbook.unlang
    title: うん言語バッチ調査
    body: |-
      sales-nightly 復旧手順

      1. ログ確認
      tail -n 50 /workspace/logs/batch.log
      → sales-nightly: うんともすんとも が出ていたら うん言語 runtime error

      2. ソース確認
      cat /workspace/services/batch/sales.un
      → うんわり の右辺が うんなし（0）だと 0 除算で失敗する

      3. 仕様確認
      右タブ「うん言語仕様表」を開く（拡大表示推奨）

      4. 修正
      vim /workspace/services/batch/sales.un
      → うん y = うんなし を うん y = うんあり に直して :wq

      または
      sed -i 's/うん y = うんなし/うん y = うんあり/' /workspace/services/batch/sales.un

      5. 動作確認
      unlang run /workspace/services/batch/sales.un
      → 数値が表示されれば OK。うんともすんとも なら未修正

      6. ログ片付け
      grep -v うんともすんとも /workspace/logs/batch.log > /tmp/b.log && mv /tmp/b.log /workspace/logs/batch.log
  - id: runbook.unlang-spec
    title: うん言語仕様表
    body: |-
      文
      うんちく: コメント（無視）
      うん <name> = <expr>: 変数定義
      うーん <expr>: 式を評価
      うん！ [<expr>]: 終了（省略時は直前の値）

      演算子（優先: かけ/わり → たす/ひく）
      うんたす: +  うんひく: -
      うんかけ: *  うんわり: /（右辺 0 で error）

      リテラル: 数値 / うんなし(0) / うんあり(1) / 変数名 / ( )

      エラーはすべて「うんともすんとも」のみ表示
      unlang run <file> … 実行  unlang check <file> … 構文チェック

      例: うん y = うんなし  のまま x うんわり y → 0 除算で失敗
slackMessages:
  - id: mystery-error
    atMs: 130000
    from: 経理
    body: 売上集計が止まってるんですが、うんともすんとも言いません。
navigationSteps:
  - id: nav-batch-log
    atMs: 0
    hint: batch.log に不親切なエラーが出ていないか確認する
    panel: terminal
    suggestedCommand: tail -n 20 /workspace/logs/batch.log
  - id: nav-spec
    atMs: 60000
    hint: うん言語仕様表 Runbook を開く
    panel: runbook
  - id: nav-editor
    atMs: 90000
    hint: Editor で sales.un を開いて壊れた行を直す
    panel: editor
