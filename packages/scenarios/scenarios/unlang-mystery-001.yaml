id: unlang-mystery-001
version: 1
title: '????'
difficulty: advanced
timeLimitMinutes: 15
service:
  name: うん用 batch
  healthUrl: http://localhost:8080/health
briefing:
  - 突如現れた謎の人物から、このサービスを運用してくれと頼まれた。
  - 手元に Runbook はない。何が起きても自分で対処するしかない。
  - 深夜バッチはうん言語で書かれているらしい。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/unyoh-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
triggers:
  - id: unlang
    atMs: 90000
    type: unlang_batch_failure
    params:
      jobId: sales-nightly
      path: /workspace/services/batch/sales.un
alerts:
  - id: batch-failed
    atMs: 100000
    severity: critical
    message: sales-nightly batch failed
    source: scenario
successConditions:
  - type: unlang_batch_ok
    jobId: sales-nightly
  - type: log_absent
    path: /workspace/logs/batch.log
    pattern: うんともすんとも
runbooks:
  - id: runbook.ar.page1
    title: صفحة 1 – السجل
    availableAtMs: 90000
    body: |-
      استعادة sales-nightly

      1. فحص السجل
      tail -n 50 /workspace/logs/batch.log
      → إذا ظهر «うんともすんとも»: خطأ وقت التشغيل في لغة أون

      2. عرض الشيفرة المصدرية
      cat /workspace/services/batch/sales.un
  - id: runbook.ar.page2
    title: صفحة 2 – الشيفرة المصدرية
    availableAtMs: 93000
    body: |-
      إرشادات لغة أون

      «うんわり» = قسمة
      «うんなし» = 0
      «うんあり» = 1

      إذا كان الطرف الأيمن من «うんわり» هو «うんなし» (0) → قسمة على صفر → «うんともすんとも»

      مثال في sales.un:
      うん y = うんなし  يبقى كما هو → x うんわり y يفشل
  - id: runbook.ar.page3
    title: صفحة 3 – الإصلاح
    availableAtMs: 96000
    body: |-
      الإصلاح والاختبار

      1. تصحيح الملف
      sed -i 's/うん y = うんなし/うん y = うんあり/' /workspace/services/batch/sales.un

      أو
      vim /workspace/services/batch/sales.un

      2. اختبار
      unlang run /workspace/services/batch/sales.un
      → رقم = OK. «うんともすんとも» = ما زال معطلاً

      3. إفراغ السجل
      : > /workspace/logs/batch.log
slackMessages:
  - id: arabic-docs
    atMs: 92000
    from: 運用
    body: 謎の人物からアラビア語の紙が3枚届いた。誰も読めない。
  - id: keiri
    atMs: 110000
    from: 経理
    body: またうんともすんともです
