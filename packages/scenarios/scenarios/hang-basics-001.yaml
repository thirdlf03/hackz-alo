id: hang-basics-001
version: 1
title: 返事をくれない API の夜
difficulty: beginner
difficultyScore: 130
timeLimitMinutes: 8
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - プロセスが「死んでいる」のと「固まっている」のは別の障害。
  - yamactl status では動いて見えるのに、curl が返ってこないことがある。
  - curl --max-time でタイムアウトを明示して、状態を切り分ける練習をする。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
triggers:
  - id: hang
    atMs: 30000
    type: process_hang
    params:
      processId: api
alerts:
  - id: latency
    atMs: 50000
    severity: warning
    message: API latency p95 is above 5s
    source: monitor
  - id: health-fail
    atMs: 70000
    severity: critical
    message: やまびこ API health check failed
    source: monitor
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: process_running
    processId: api
runbooks:
  - id: runbook.hang-basics
    title: ハング(固まり)の切り分け
    body: |-
      1. curl --max-time 3 localhost:8080/health を実行する(タイムアウトも重要な情報)
      2. yamactl status api でプロセスの生死を確認する。動いているのに応答しないなら「ハング」
      3. ps -o pid,stat,cmd で状態を見る。STAT が T なら停止シグナルで固まっている
      4. app.log に前兆(GC pause など)がないか確認する
      5. yamactl restart api で再起動し、health で復旧確認する
chatMessages:
  - id: boss-hang-basics
    atMs: 90000
    from: 上司
    body: 落ちてはいないんでしょ？なら平気そうだけど。おやすみ。
navigationSteps:
  - id: nav-status
    atMs: 10000
    hint: yamactl status api でプロセスの生死を確認する(動いて見える点に注意)
    panel: terminal
    suggestedCommand: yamactl status api
  - id: nav-curl
    atMs: 35000
    hint: タイムアウト付きで応答を確認する。固まっていれば返ってこない
    panel: terminal
    suggestedCommand: curl --max-time 3 localhost:8080/health
  - id: nav-ps
    atMs: 50000
    hint: ps aux | grep node で状態を確認する。STAT が T なら停止シグナルで固まっている
    panel: terminal
    suggestedCommand: ps aux | grep node
  - id: nav-runbook
    atMs: 70000
    hint: ハングの切り分け Runbook で復旧手順を確認する
    panel: runbook
