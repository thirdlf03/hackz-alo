id: alert-spam-001
version: 1
title: アラートがうるさすぎる夜
difficulty: intermediate
timeLimitMinutes: 12
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - 通知が鳴りやまない。撤去し忘れた古いノイズ発生源(通知デーモン)が残っている疑いがある。
  - ノイズに紛れて、本物の障害も同時に起きている。見逃さないこと。
  - 監視パネルと app.log を併用し、ノイズと本物を切り分けて優先度を付ける。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
triggers:
  - id: spam
    atMs: 45000
    type: alert_spam
    params:
      count: 32
  - id: real-stop
    atMs: 75000
    type: process_stop
    params:
      processId: api
alerts:
  - id: noise-1
    atMs: 50000
    severity: warning
    message: CPU fan is dancing
    source: monitor
  - id: noise-2
    atMs: 52000
    severity: critical
    message: Energy drink stock critically low
    source: monitor
  - id: noise-3
    atMs: 54000
    severity: warning
    message: Janitor camera lens fogged
    source: monitor
  - id: noise-4
    atMs: 56000
    severity: warning
    message: Fridge door open for 3 minutes
    source: monitor
  - id: noise-5
    atMs: 58000
    severity: critical
    message: Wing deployment detected on operator
    source: scenario
  - id: noise-6
    atMs: 60000
    severity: warning
    message: Keyboard moisture sensor tripped
    source: monitor
  - id: real-down
    atMs: 82000
    severity: critical
    message: やまびこ API health check failed
    source: monitor
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: process_running
    processId: api
  - type: process_absent
    processId: alert-flood-daemon
runbooks:
  - id: runbook.alert-spam
    title: アラートスパム対応
    body: |-
      1. 大量に鳴っていても、まず SERVICE HEALTH のような実指標を優先して見る
      2. app.log にノイズを吐き続けているプロセスがいないか確認する(ps / pgrep)
      3. ノイズ源を止めたら、ログに残る「本物」の障害の痕跡を探す
      4. 見つかった障害に応じて復旧する(例: yamactl restart api)
      5. curl localhost:8080/health で復旧確認する
chatMessages:
  - id: pager-duty
    atMs: 70000
    from: Pager
    body: 32件鳴ってます。全部見なくていいです。
navigationSteps:
  - id: nav-metrics
    atMs: 0
    hint: SERVICE HEALTH を先に見る。件数に惑わされない
    panel: metrics
  - id: nav-spam-file
    atMs: 50000
    hint: ノイズを吐き続けているプロセスがいないか探す
    panel: terminal
    suggestedCommand: ps aux | grep node
  - id: nav-real
    atMs: 78000
    hint: ノイズの陰で本物の障害が起きていないか、app.log と health を確認する
    panel: terminal
    suggestedCommand: tail -n 50 /workspace/logs/app.log
  - id: nav-runbook
    atMs: 90000
    hint: アラートスパム Runbook を開く
    panel: runbook
