id: janitor-power-001
version: 1
title: 掃除のおばちゃんが電源を抜いた夜
difficulty: beginner
difficultyScore: 170
timeLimitMinutes: 8
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - 初級の卒業試験。復旧は簡単だが、原因の裏付けを取ってから報告すること。
  - 深夜のデータセンターには掃除の方が巡回しており、コンセント周りに触れることがある。
  - まずは影響を確認し、それから「なぜ落ちたか」の手がかりを app.log から拾う。原因の裏付けは、直すことと同じくらい大事な仕事。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
    - id: power
      label: 電源
      kind: external
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
    - from: api
      to: power
triggers:
  - id: janitor-pull
    atMs: 60000
    type: janitor_power_pull
    params:
      processId: api
alerts:
  - id: power-lost
    atMs: 75000
    severity: critical
    message: やまびこ API health check failed
    source: monitor
  - id: janitor-cam
    atMs: 90000
    severity: warning
    message: Janitor camera detected unplugged cable
    source: scenario
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: process_running
    processId: api
runbooks:
  - id: runbook.janitor
    title: 予期せぬプロセス停止の初動
    body: |-
      1. curl localhost:8080/health で影響範囲を確認する
      2. yamactl status api でプロセスの生死を確認する
      3. app.log を確認し、なぜ落ちたのか手がかりになる記述がないか探す(電源断など外的要因の痕跡)
      4. 見つかった証跡は復旧後の報告用に控えておく
      5. yamactl restart api で復旧し、health で確認する
chatMessages:
  - id: janitor-sorry
    atMs: 100000
    from: 掃除のおばちゃん
    body: ごめんなさい、掃除中に抜いちゃいました。
navigationSteps:
  - id: nav-health
    atMs: 0
    hint: SERVICE HEALTH が緑か確認する
    panel: metrics
  - id: nav-evidence
    atMs: 45000
    hint: app.log で原因の手がかりを探す。復旧後の報告のためにも記録しておく
    panel: terminal
    suggestedCommand: tail /workspace/logs/app.log
  - id: nav-runbook
    atMs: 70000
    hint: プロセス停止時の初動 Runbook を開く
    panel: runbook
