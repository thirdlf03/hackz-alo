id: log-bloat-001
version: 1
title: ログ雪崩の夜
difficulty: intermediate
timeLimitMinutes: 12
service:
  name: やまびこ API
  healthUrl: http://localhost:8080/health
briefing:
  - ログ肥大化は disk full より前に latency を悪化させる。
  - du と tail で犯人ログを特定する。
startup:
  - id: api
    command: PORT=8080 node /workspace/services/yamabiko-api/server.mjs
    waitForPort: 8080
  - id: fake-db
    command: node /workspace/services/fake-db/server.mjs
    waitForPort: 15432
topology:
  nodes:
    - id: user
      label: ユーザー
      kind: external
    - id: api
      label: やまびこ API
      kind: service
      processId: api
    - id: fake-db
      label: 疑似データベース
      kind: datastore
      processId: fake-db
  edges:
    - from: user
      to: api
    - from: api
      to: fake-db
triggers:
  - id: log-bloat
    atMs: 50000
    type: disk_full
    params:
      path: /workspace/logs/access.log
      bytes: 536870912
alerts:
  - id: disk-high
    atMs: 80000
    severity: warning
    message: Disk usage is above 90%
    source: monitor
  - id: http-500
    atMs: 95000
    severity: critical
    message: HTTP 500 rate is above threshold
    source: scenario
successConditions:
  - type: http_status
    url: http://localhost:8080/health
    status: 200
  - type: disk_usage_below
    path: /workspace
    valuePercent: 85
runbooks:
  - id: runbook.log-bloat
    title: ログ肥大化
    body: 1. du -sh /workspace/logs/*\n2. 不要ログを削除\n3. curl localhost:8080/health
chatMessages: []
navigationSteps:
  - id: nav-disk
    atMs: 0
    hint: Disk メトリクスの上昇を確認する
    panel: metrics
  - id: nav-du
    atMs: 55000
    hint: どのログが肥大化したか調べる
    panel: terminal
    suggestedCommand: du -sh /workspace/logs/*
  - id: nav-runbook
    atMs: 85000
    hint: ログ肥大化 Runbook を開く
    panel: runbook
