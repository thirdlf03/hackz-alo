name = "incident-training-worker"
main = "src/index.ts"
compatibility_date = "2026-06-20"
compatibility_flags = ["nodejs_compat"]
logpush = true

# Frontend (Vite build output). Run `npm run build` before deploy.
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["*/10 * * * *"]

# Custom domain (thirdlf03.com must be on Cloudflare). Deploy creates DNS + TLS.
[[routes]]
pattern = "incident.thirdlf03.com"
custom_domain = true

# Replace local-development IDs before the first remote deploy:
#   npm run setup:cloudflare
[[containers]]
class_name = "Sandbox"
image = "../../sandbox/container/Dockerfile"
instance_type = "lite"
max_instances = 5

[containers.constraints]
regions = ["APAC"]

[[d1_databases]]
binding = "DB"
database_name = "incident-training"
database_id = "df62c8a7-8284-445d-af8f-70eee4db597a"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "REPLAY_BUCKET"
bucket_name = "incident-training-replays"

[[kv_namespaces]]
binding = "SCENARIO_KV"
id = "af8bab445e0646a190096563ebaad273"

[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDurableObject"

[[durable_objects.bindings]]
name = "Sandbox"
class_name = "Sandbox"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDurableObject", "Sandbox"]
