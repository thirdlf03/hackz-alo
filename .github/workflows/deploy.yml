name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:scenarios
      - run: pnpm run build
      - run: pnpm run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - run: pnpm --filter @incident/worker run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Post-deploy ready check
        run: |
          if [ -n "$INCIDENT_WORKER_URL" ]; then
            curl -sf "$INCIDENT_WORKER_URL/api/ready"
          else
            echo "Set INCIDENT_WORKER_URL secret to enable post-deploy smoke"
          fi
        env:
          INCIDENT_WORKER_URL: ${{ secrets.INCIDENT_WORKER_URL }}
