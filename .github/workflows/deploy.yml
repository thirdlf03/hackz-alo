name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:scenarios
      - run: pnpm run build
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      - run: pnpm run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - run: pnpm --filter @incident/worker run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Post-deploy smoke
        run: pnpm run deploy:smoke
        env:
          INCIDENT_WORKER_URL: ${{ secrets.INCIDENT_WORKER_URL }}
          INCIDENT_SMOKE_TURNSTILE_TOKEN: ${{ secrets.INCIDENT_SMOKE_TURNSTILE_TOKEN }}
