name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:scenarios
      - run: pnpm run check:sandbox-assets
      - run: pnpm run fmt:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run test:integration
      - run: pnpm run audit:schema-sync
      - run: pnpm run audit:route-body
      - run: pnpm run audit:coupling -- --strict

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:scenarios
      - run: pnpm run build
      - run: pnpm run db:migrate:local
      - run: docker info
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:integration
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:scenarios
      - run: pnpm run perf:bench
      - run: pnpm run perf:report
      - run: pnpm run perf:compare
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: perf-reports
          path: |
            perf-reports/
            .perf/
          retention-days: 7
